version: '3.8'

services:
  ai_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: epc_ai_app
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LOG_LEVEL=INFO
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - COLLECTION_NAME=epc_knowledge_base
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - RERANKER_TYPE=identity
      - COMPLIANCE_THRESHOLD=0.8
      - QUALITY_THRESHOLD=0.75
      - RECOMMENDATION_LIMIT=5
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - epc_network
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: epc_qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - epc_network
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6333/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  redis:
    image: redis:alpine
    container_name: epc_redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - epc_network
    restart: always

volumes:
  qdrant_data:
  redis_data:

networks:
  epc_network:
    driver: bridge
